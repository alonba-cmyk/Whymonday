<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S1 — Variant A</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root { --purple:#6161ff; }
html, body { background:#000; font-family:'Poppins',sans-serif; color:#fff; }

.slide {
  width:100%;
  min-height:100svh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  position:relative;
  overflow:hidden;
}

.slide-label {
  position:absolute; top:0; left:0; right:0;
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 20px;
  z-index:10;
  font-size:9px; font-weight:600; letter-spacing:3px; text-transform:uppercase;
  color:rgba(255,255,255,0.3);
}
.badge {
  background:var(--purple); color:#fff;
  font-size:8px; font-weight:700; letter-spacing:1px;
  padding:3px 9px; border-radius:20px; text-transform:uppercase;
}

.strip-img { width:100%; display:block; }

/* ── Body content ── */
.va-body {
  display:flex; flex-direction:column; align-items:center;
  padding:0 28px 32px;
}
.va-logo { height:20px; filter:brightness(0) invert(1); opacity:0.9; margin-bottom:28px; }
.va-headline {
  font-size:clamp(42px,11vw,60px); font-weight:900; line-height:0.98;
  letter-spacing:-2.5px; text-align:center; margin-bottom:14px;
  background:linear-gradient(140deg,#fff 45%,rgba(255,255,255,0.42));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.va-sub {
  font-size:13px; font-weight:300; color:rgba(255,255,255,0.4);
  text-align:center; line-height:1.5; min-height:1.4em;
}
.cursor { display:inline-block; width:2px; background:#fff; margin-left:2px; animation:blink 0.9s infinite; vertical-align:middle; }
.cursor.tall  { height:clamp(34px,8.5vw,48px); }
.cursor.short { height:14px; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
</style>
</head>
<body>

<div class="slide">
  <div class="slide-label">A — Headline First <span class="badge">Bold</span></div>
  <div class="va-body">
    <img class="va-logo" src="https://uauxewnxnprttvxnvsit.supabase.co/storage/v1/object/public/monday%20Logo/monday.com%20Logo.png" alt="monday.com">
    <h1 class="va-headline" id="line1"></h1>
    <p class="va-sub" id="line2"></p>
  </div>
  <img class="strip-img" src="https://uauxewnxnprttvxnvsit.supabase.co/storage/v1/object/public/Agents%20and%20People/Agents%20and%20People%20strip.png" alt="People and Agents">
</div>

<script>
function typeWriter(el, text, speed, cls, done) {
  let i = 0;
  const cur = document.createElement('span');
  cur.className = 'cursor ' + cls;
  el.appendChild(cur);
  function t() {
    if (i < text.length) {
      el.insertBefore(document.createTextNode(text[i++]), cur);
      setTimeout(t, speed + Math.random() * 25);
    } else {
      cur.remove();
      if (done) done();
    }
  }
  t();
}

setTimeout(() => {
  typeWriter(document.getElementById('line1'), 'People and agents.', 52, 'tall', () => {
    setTimeout(() => {
      typeWriter(document.getElementById('line2'), 'Working together. Driving results.', 42, 'short');
    }, 350);
  });
}, 500);
</script>
</body>
</html>
