<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S1 Mission – Orbit</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #0a0a0a;
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 16px;
  }

  @keyframes cw  { to { transform: rotate( 360deg); } }
  @keyframes ccw { to { transform: rotate(-360deg); } }

  /* ── Phone ── */
  .phone {
    width: 320px;
    background: #000;
    border-radius: 40px;
    border: 1.5px solid rgba(255,255,255,0.1);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 52px 0 40px;
    gap: 0;
    box-shadow: 0 40px 80px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.04);
  }
  .phone::before {
    content: '';
    position: absolute;
    top: 14px; left: 50%;
    transform: translateX(-50%);
    width: 72px; height: 5px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
  }

  .eyebrow {
    font-size: 9px; font-weight: 600;
    letter-spacing: 5px; text-transform: uppercase;
    color: #6161ff; margin-bottom: 24px;
  }

  /* ── Orbit ── */
  .orbit-wrap {
    position: relative;
    width: 296px; height: 296px;
    flex-shrink: 0;
  }
  .orbit-people {
    position: absolute; inset: 0;
    animation: cw 45s linear infinite;
  }
  .orbit-people.paused { animation-play-state: paused; }

  .orbit-glow {
    position: absolute; top:50%; left:50%;
    transform: translate(-50%,-50%);
    width: 150px; height: 150px;
    background: radial-gradient(circle, rgba(97,97,255,0.14) 0%, transparent 70%);
    border-radius: 50%; pointer-events:none;
  }
  .ring {
    position: absolute; border-radius: 50%;
    top:50%; left:50%; transform:translate(-50%,-50%);
    pointer-events: none;
  }
  .ring-outer { width:272px; height:272px; border:1px solid rgba(255,255,255,0.07); }

  .orbit-center {
    position: absolute; top:50%; left:50%;
    transform: translate(-50%,-50%);
    text-align: center; width: 142px; z-index: 2;
    pointer-events: none;
  }
  .orbit-center h2 {
    font-size: 11.5px; font-weight: 800;
    line-height: 1.4; color: #fff;
  }

  /* SVG lines */
  .orbit-svg {
    position: absolute; inset:0;
    width:100%; height:100%;
    overflow:visible; pointer-events:none;
  }

  /* People */
  .orbit-person {
    position: absolute;
    display: flex; flex-direction: column;
    align-items: center; gap: 4px;
    z-index: 3; cursor: pointer;
    animation: ccw 45s linear infinite;
  }
  .orbit-av {
    width: 42px; height: 42px;
    border-radius: 50%; border: 2px solid;
    overflow: hidden; background: #111;
    transition: box-shadow 0.3s, transform 0.2s;
  }
  .orbit-person.active .orbit-av { transform: scale(1.18); }
  .orbit-av img { width:100%; height:100%; object-fit:cover; object-position:top center; }
  .orbit-name {
    font-size: 8px; font-weight: 600;
    letter-spacing: 0.3px; white-space: nowrap;
  }

  /* Positions — r=108, center=148 */
  .p-sales      { left:127px; top: 19px; }
  .p-finance    { left:203px; top: 50px; }
  .p-hr         { left:235px; top:127px; }
  .p-it         { left:203px; top:203px; }
  .p-legal      { left:127px; top:235px; }
  .p-marketing  { left: 50px; top:203px; }
  .p-operations { left: 19px; top:127px; }
  .p-product    { left: 50px; top: 50px; }

  /* ── Info card ── */
  .info-card {
    width: 100%;
    padding: 0 24px;
    margin-top: 20px;
    min-height: 56px;
    display: flex; flex-direction: column;
    align-items: center; gap: 4px;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.3s ease, transform 0.3s ease;
    pointer-events: none;
  }
  .info-card.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .info-dept {
    font-size: 10px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
  }
  .info-desc {
    font-size: 11px; font-weight: 300;
    color: rgba(255,255,255,0.5);
    text-align: center; line-height: 1.5;
  }
</style>
</head>
<body>

<div class="phone">
  <p class="eyebrow">Our Mission</p>

  <div class="orbit-wrap">
    <div class="orbit-glow"></div>
    <div class="ring ring-outer"></div>

    <div class="orbit-center">
      <h2>monday's mission has always been to help businesses achieve their goals.</h2>
    </div>

    <div class="orbit-people" id="orbitPeople">
      <svg class="orbit-svg" viewBox="0 0 296 296" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="148" y1="148" x2="148" y2="40"  stroke="rgba(97,97,255,0.2)" stroke-width="0.8" stroke-dasharray="3 5"/>
        <line x1="148" y1="148" x2="224" y2="71"  stroke="rgba(97,97,255,0.2)" stroke-width="0.8" stroke-dasharray="3 5"/>
        <line x1="148" y1="148" x2="256" y2="148" stroke="rgba(97,97,255,0.2)" stroke-width="0.8" stroke-dasharray="3 5"/>
        <line x1="148" y1="148" x2="224" y2="224" stroke="rgba(97,97,255,0.2)" stroke-width="0.8" stroke-dasharray="3 5"/>
        <line x1="148" y1="148" x2="148" y2="256" stroke="rgba(97,97,255,0.2)" stroke-width="0.8" stroke-dasharray="3 5"/>
        <line x1="148" y1="148" x2="71"  y2="224" stroke="rgba(97,97,255,0.2)" stroke-width="0.8" stroke-dasharray="3 5"/>
        <line x1="148" y1="148" x2="40"  y2="148" stroke="rgba(97,97,255,0.2)" stroke-width="0.8" stroke-dasharray="3 5"/>
        <line x1="148" y1="148" x2="71"  y2="71"  stroke="rgba(97,97,255,0.2)" stroke-width="0.8" stroke-dasharray="3 5"/>
      </svg>

      <div class="orbit-person p-sales"      data-name="Sales"      data-color="#F9D27A" data-desc="Faster revenue generation">
        <div class="orbit-av" style="border-color:#F9D27A90"><img src="https://uauxewnxnprttvxnvsit.supabase.co/storage/v1/object/public/People%20Avatars/Sales.png" alt=""></div>
        <span class="orbit-name" style="color:#F9D27A">Sales</span>
      </div>
      <div class="orbit-person p-finance"    data-name="Finance"    data-color="#93C6E7" data-desc="Streamline financial operations efficiently">
        <div class="orbit-av" style="border-color:#93C6E790"><img src="https://uauxewnxnprttvxnvsit.supabase.co/storage/v1/object/public/People%20Avatars/Finance.png" alt=""></div>
        <span class="orbit-name" style="color:#93C6E7">Finance</span>
      </div>
      <div class="orbit-person p-hr"         data-name="HR"         data-color="#8ECEC0" data-desc="Accelerate onboarding & employee experience">
        <div class="orbit-av" style="border-color:#8ECEC090"><img src="https://uauxewnxnprttvxnvsit.supabase.co/storage/v1/object/public/People%20Avatars/HR.png" alt=""></div>
        <span class="orbit-name" style="color:#8ECEC0">HR</span>
      </div>
      <div class="orbit-person p-it"         data-name="IT"         data-color="#A89BD9" data-desc="Secure, scalable infrastructure at speed">
        <div class="orbit-av" style="border-color:#A89BD990"><img src="https://uauxewnxnprttvxnvsit.supabase.co/storage/v1/object/public/People%20Avatars/IT.png" alt=""></div>
        <span class="orbit-name" style="color:#A89BD9">IT</span>
      </div>
      <div class="orbit-person p-legal"      data-name="Legal"      data-color="#F6C27A" data-desc="Reduce risk and move faster on decisions">
        <div class="orbit-av" style="border-color:#F6C27A90"><img src="https://uauxewnxnprttvxnvsit.supabase.co/storage/v1/object/public/People%20Avatars/Legal.png" alt=""></div>
        <span class="orbit-name" style="color:#F6C27A">Legal</span>
      </div>
      <div class="orbit-person p-marketing"  data-name="Marketing"  data-color="#F48FB1" data-desc="Drive demand and accelerate the sales cycle">
        <div class="orbit-av" style="border-color:#F48FB190"><img src="https://uauxewnxnprttvxnvsit.supabase.co/storage/v1/object/public/People%20Avatars/MARKETING.png" alt=""></div>
        <span class="orbit-name" style="color:#F48FB1">Marketing</span>
      </div>
      <div class="orbit-person p-operations" data-name="Operations" data-color="#85C1AE" data-desc="Operational excellence at scale">
        <div class="orbit-av" style="border-color:#85C1AE90"><img src="https://uauxewnxnprttvxnvsit.supabase.co/storage/v1/object/public/People%20Avatars/OPERATIONS.png" alt=""></div>
        <span class="orbit-name" style="color:#85C1AE">Operations</span>
      </div>
      <div class="orbit-person p-product"    data-name="Product"    data-color="#7FC8D4" data-desc="Ship faster with the power to build anything">
        <div class="orbit-av" style="border-color:#7FC8D490"><img src="https://uauxewnxnprttvxnvsit.supabase.co/storage/v1/object/public/People%20Avatars/PRODUCT.png" alt=""></div>
        <span class="orbit-name" style="color:#7FC8D4">Product</span>
      </div>
    </div>
  </div>

  <!-- Info card below orbit -->
  <div class="info-card" id="infoCard">
    <span class="info-dept" id="infoDept"></span>
    <span class="info-desc" id="infoDesc"></span>
  </div>
</div>

<script>
  const people = Array.from(document.querySelectorAll('.orbit-person'));
  const card     = document.getElementById('infoCard');
  const infoDept = document.getElementById('infoDept');
  const infoDesc = document.getElementById('infoDesc');
  const INTERVAL = 5625; // 45s / 8 people
  let current = 0;

  function activate(idx) {
    const prev = people[current];
    const next = people[idx];
    const color = next.dataset.color;

    // Reset all
    people.forEach(p => {
      p.classList.remove('active');
      p.querySelector('.orbit-av').style.boxShadow = '';
    });

    // Highlight new
    next.classList.add('active');
    next.querySelector('.orbit-av').style.boxShadow =
      `0 0 20px ${color}90, 0 0 40px ${color}30`;

    // Swap card content
    card.classList.remove('visible');
    setTimeout(() => {
      infoDept.textContent  = next.dataset.name;
      infoDept.style.color  = color;
      infoDesc.textContent  = next.dataset.desc;
      card.classList.add('visible');
    }, 180);

    current = idx;
  }

  // Kick off immediately, then cycle
  activate(0);
  setInterval(() => activate((current + 1) % people.length), INTERVAL);
</script>
</body>
</html>
