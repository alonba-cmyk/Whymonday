<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S1 Mission – Orbit Variant</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#111; font-family:'Poppins',sans-serif; display:flex; flex-direction:column; align-items:center; padding:32px 16px 64px; gap:16px; }
  .label { color:#888; font-size:11px; letter-spacing:3px; text-transform:uppercase; }

  /* Phone shell */
  .phone { width:320px; background:#000; border-radius:36px; border:2px solid rgba(255,255,255,0.12); overflow:hidden; position:relative; }
  .phone-inner { padding:48px 0 40px; display:flex; flex-direction:column; align-items:center; }

  /* Eyebrow */
  .eyebrow { font-size:9px; font-weight:600; letter-spacing:4px; text-transform:uppercase; color:#6161ff; margin-bottom:20px; }

  /* Orbit container */
  .orbit-wrap {
    position: relative;
    width: 300px;
    height: 300px;
    flex-shrink: 0;
  }

  /* Concentric rings */
  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.08);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .ring-outer { width: 280px; height: 280px; }
  .ring-inner { width: 178px; height: 178px; }

  /* Center text */
  .orbit-center {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    width: 150px;
    z-index: 2;
  }
  .orbit-center h2 {
    font-size: 12px;
    font-weight: 800;
    line-height: 1.3;
    color: #fff;
  }

  /* People on orbit */
  .orbit-person {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    z-index: 3;
  }
  .orbit-av {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 2px solid;
    overflow: hidden;
    background: #111;
  }
  .orbit-av img { width: 100%; height: 100%; object-fit: cover; object-position: top center; }
  .orbit-name {
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  /*
    Container 300×300, center at (150,150), orbit radius=118px
    Avatar 40×40, label ~14px below
    position = center - radius*[cos/sin] - avatar/2

    angle from top clockwise:
    Sales      0°:   left=130, top=  8
    Finance   45°:   left=213, top= 42
    HR        90°:   left=250, top=130
    IT       135°:   left=213, top=213
    Legal    180°:   left=130, top=250
    Marketing 225°:  left= 47, top=213
    Operations270°:  left= 10, top=130
    Product  315°:   left= 47, top= 42
  */
  .p-sales      { left:130px; top:  8px; }
  .p-finance    { left:213px; top: 42px; }
  .p-hr         { left:250px; top:130px; }
  .p-it         { left:213px; top:213px; }
  .p-legal      { left:130px; top:250px; }
  .p-marketing  { left: 47px; top:213px; }
  .p-operations { left: 10px; top:130px; }
  .p-product    { left: 47px; top: 42px; }
</style>
</head>
<body>

<div class="label">S1 Mission — Orbit Mobile Variant</div>

<div class="phone">
  <div class="phone-inner">
    <p class="eyebrow">Our Mission</p>

    <div class="orbit-wrap">
      <!-- Rings -->
      <div class="ring ring-outer"></div>
      <div class="ring ring-inner"></div>

      <!-- Center text -->
      <div class="orbit-center">
        <h2>monday's mission has always been to help businesses achieve their goals.</h2>
      </div>

      <!-- People -->
      <div class="orbit-person p-sales">
        <div class="orbit-av" style="border-color:#F9D27A80">
          <img src="https://uauxewnxnprttvxnvsit.supabase.co/storage/v1/object/public/People%20Avatars/Sales.png" alt="">
        </div>
        <span class="orbit-name" style="color:#F9D27A">Sales</span>
      </div>

      <div class="orbit-person p-finance">
        <div class="orbit-av" style="border-color:#93C6E780">
          <img src="https://uauxewnxnprttvxnvsit.supabase.co/storage/v1/object/public/People%20Avatars/Finance.png" alt="">
        </div>
        <span class="orbit-name" style="color:#93C6E7">Finance</span>
      </div>

      <div class="orbit-person p-hr">
        <div class="orbit-av" style="border-color:#8ECEC080">
          <img src="https://uauxewnxnprttvxnvsit.supabase.co/storage/v1/object/public/People%20Avatars/HR.png" alt="">
        </div>
        <span class="orbit-name" style="color:#8ECEC0">HR</span>
      </div>

      <div class="orbit-person p-it">
        <div class="orbit-av" style="border-color:#A89BD980">
          <img src="https://uauxewnxnprttvxnvsit.supabase.co/storage/v1/object/public/People%20Avatars/IT.png" alt="">
        </div>
        <span class="orbit-name" style="color:#A89BD9">IT</span>
      </div>

      <div class="orbit-person p-legal">
        <div class="orbit-av" style="border-color:#F6C27A80">
          <img src="https://uauxewnxnprttvxnvsit.supabase.co/storage/v1/object/public/People%20Avatars/Legal.png" alt="">
        </div>
        <span class="orbit-name" style="color:#F6C27A">Legal</span>
      </div>

      <div class="orbit-person p-marketing">
        <div class="orbit-av" style="border-color:#F48FB180">
          <img src="https://uauxewnxnprttvxnvsit.supabase.co/storage/v1/object/public/People%20Avatars/MARKETING.png" alt="">
        </div>
        <span class="orbit-name" style="color:#F48FB1">Marketing</span>
      </div>

      <div class="orbit-person p-operations">
        <div class="orbit-av" style="border-color:#85C1AE80">
          <img src="https://uauxewnxnprttvxnvsit.supabase.co/storage/v1/object/public/People%20Avatars/OPERATIONS.png" alt="">
        </div>
        <span class="orbit-name" style="color:#85C1AE">Operations</span>
      </div>

      <div class="orbit-person p-product">
        <div class="orbit-av" style="border-color:#7FC8D480">
          <img src="https://uauxewnxnprttvxnvsit.supabase.co/storage/v1/object/public/People%20Avatars/PRODUCT.png" alt="">
        </div>
        <span class="orbit-name" style="color:#7FC8D4">Product</span>
      </div>
    </div>
  </div>
</div>

</body>
</html>
