<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobile Hero — Exploration</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --purple: #6161ff; --dim: rgba(255,255,255,0.42); --bg: #09090f; }

    body {
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
      margin: 0;
      padding: 0;
    }

    /* ── Hero shell — full screen ── */
    .hero {
      width: 100vw;
      height: 100vh;
      background: var(--bg);
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Glows — absolute, decorative only */
    .glow-l {
      position: absolute; left: -80px; top: 28%;
      width: 280px; height: 280px;
      background: #6161ff; filter: blur(110px); opacity: .10; border-radius: 50%;
      pointer-events: none;
    }
    .glow-r {
      position: absolute; right: -80px; top: 18%;
      width: 280px; height: 280px;
      background: #a855f7; filter: blur(110px); opacity: .09; border-radius: 50%;
      pointer-events: none;
    }

    /* Logo bar — in flow */
    .top-bar {
      width: 100%;
      padding-top: 20px;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      flex-shrink: 0;
      position: relative; z-index: 1;
      opacity: 0;
      animation: fadeUp .5s ease forwards .2s;
    }
    .logo-img { height: 26px; }
    .eyebrow-tag {
      font-size: 9px; font-weight: 700; letter-spacing: 5px;
      text-transform: uppercase; color: var(--purple);
    }

    /* Characters container — takes remaining space, chars sit at bottom */
    .chars-wrap {
      flex: 1;
      width: 100%;
      position: relative;
      overflow: hidden;
    }
    .chars {
      position: absolute; bottom: 0; left: 0; right: 0;
      display: flex; align-items: flex-end; justify-content: center;
    }
    .char-h {
      width: 260px; object-fit: contain; object-position: bottom;
      transform: translateX(-130%);
      opacity: 0;
      transition: transform .85s cubic-bezier(.22,.9,.36,1), opacity .65s ease;
    }
    .char-a {
      width: 260px; object-fit: contain; object-position: bottom;
      margin-left: -68px;
      transform: translateX(130%);
      opacity: 0;
      transition: transform .85s cubic-bezier(.22,.9,.36,1), opacity .65s ease;
    }
    .chars.entered .char-h { transform: translateX(0); opacity: 1; }
    .chars.entered .char-a { transform: translateX(0); opacity: 1; }

    /* Glow spark between characters */
    .chars-spark {
      position: absolute;
      bottom: 38%;
      left: 50%;
      transform: translate(-50%, 50%);
      width: 90px; height: 90px;
      background: radial-gradient(circle, rgba(97,97,255,0.55) 0%, rgba(168,85,247,0.25) 45%, transparent 70%);
      border-radius: 50%;
      filter: blur(14px);
      opacity: 0;
      transition: opacity 1s ease .7s;
      pointer-events: none;
    }
    .chars.entered .chars-spark { opacity: 1; }

    /* Text copy — in flow, below characters */
    .copy {
      width: 100%;
      padding: 12px 24px 22px;
      text-align: center;
      flex-shrink: 0;
      position: relative; z-index: 1;
      opacity: 0;
      animation: fadeUp .5s ease forwards .7s;
    }
    .hl {
      font-size: clamp(22px, 5.8vw, 30px);
      font-weight: 800;
      line-height: 1.18;
      letter-spacing: 0;
      background: linear-gradient(140deg, #fff 50%, rgba(255,255,255,0.45));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      min-height: 3.4em;
    }

    /* Cursor */
    .cursor {
      display: inline-block;
      width: 2px; height: .85em;
      background: var(--purple);
      vertical-align: middle;
      margin-left: 2px;
      animation: blink .7s step-end infinite;
    }
    .cursor.done { animation: none; opacity: 0; }

    /* Replay */
    .replay {
      position: absolute; bottom: 10px; right: 12px;
      background: none; border: none;
      padding: 4px 8px;
      font-size: 10px; font-weight: 500; color: rgba(255,255,255,0.2);
      cursor: pointer; letter-spacing: .4px;
      transition: color .2s;
    }
    .replay:hover { color: rgba(255,255,255,0.5); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="hero" id="hero">
    <div class="glow-l"></div>
    <div class="glow-r"></div>

    <div class="top-bar">
      <img class="logo-img" src="https://uauxewnxnprttvxnvsit.supabase.co/storage/v1/object/public/monday%20Logo/monday.com%20Logo.png" alt="monday.com">
      <span class="eyebrow-tag">AI Work Platform</span>
    </div>

    <div class="chars-wrap">
      <div class="chars" id="chars">
        <img class="char-h" src="https://uauxewnxnprttvxnvsit.supabase.co/storage/v1/object/public/Agents%20and%20People/Human.png" alt="Human">
        <div class="chars-spark"></div>
        <img class="char-a" src="https://uauxewnxnprttvxnvsit.supabase.co/storage/v1/object/public/Agents%20and%20People/Agent.png" alt="Agent">
      </div>
    </div>

    <div class="copy">
      <div class="hl" id="hl"><span class="cursor" id="cursor"></span></div>
    </div>

    <button class="replay" id="replayBtn">↺ Replay</button>
  </div>

  <script>
    const TEXT = 'People and agents\nworking together\ndriving business results.';
    const CHAR_DELAY = 52;
    const START_DELAY = 900;

    const hlEl      = document.getElementById('hl');
    const cursor    = document.getElementById('cursor');
    const charsEl   = document.getElementById('chars');
    const replayBtn = document.getElementById('replayBtn');

    let timer = null;

    function reset() {
      clearTimeout(timer);
      hlEl.innerHTML = '';
      hlEl.appendChild(cursor);
      cursor.classList.remove('done');
      charsEl.classList.remove('entered');
    }

    function type(fullText, i = 0) {
      if (i === 0) { hlEl.innerHTML = ''; hlEl.appendChild(cursor); }

      if (i < fullText.length) {
        const ch = fullText[i];
        if (ch === '\n') {
          hlEl.insertBefore(document.createElement('br'), cursor);
        } else {
          hlEl.insertBefore(document.createTextNode(ch), cursor);
        }
        timer = setTimeout(() => type(fullText, i + 1), CHAR_DELAY);
      } else {
        cursor.classList.add('done');
        timer = setTimeout(() => charsEl.classList.add('entered'), 200);
      }
    }

    function start() { reset(); timer = setTimeout(() => type(TEXT), START_DELAY); }

    replayBtn.addEventListener('click', start);
    start();
  </script>

</body>
</html>
