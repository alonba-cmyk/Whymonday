<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobile Hero — Exploration</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --purple: #6161ff; --dim: rgba(255,255,255,0.42); --bg: #09090f; }

    body {
      background: #070710;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 20px 64px;
    }

    .page-eyebrow {
      font-size: 9px; font-weight: 700; letter-spacing: 5px;
      text-transform: uppercase; color: var(--purple);
      text-align: center; margin-bottom: 10px;
    }
    .page-title { font-size: 24px; font-weight: 800; text-align: center; letter-spacing: -.5px; margin-bottom: 6px; }
    .page-sub { font-size: 13px; color: var(--dim); text-align: center; line-height: 1.6; margin-bottom: 40px; }

    /* ── Hero shell ── */
    .hero {
      width: 100%;
      max-width: 420px;
      height: 640px;
      background: var(--bg);
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.07);
      overflow: hidden;
      position: relative;
    }

    /* Glows */
    .glow-l {
      position: absolute; left: -80px; top: 32%;
      width: 280px; height: 280px;
      background: #6161ff; filter: blur(110px); opacity: .10; border-radius: 50%;
      pointer-events: none;
    }
    .glow-r {
      position: absolute; right: -80px; top: 22%;
      width: 280px; height: 280px;
      background: #a855f7; filter: blur(110px); opacity: .09; border-radius: 50%;
      pointer-events: none;
    }

    /* Logo bar */
    .top-bar {
      position: absolute; top: 36px; left: 0; right: 0;
      display: flex; flex-direction: column; align-items: center; gap: 7px;
      opacity: 0;
      animation: fadeUp .5s ease forwards .2s;
    }
    .logo-img { height: 26px; }
    .eyebrow-tag {
      font-size: 9px; font-weight: 700; letter-spacing: 5px;
      text-transform: uppercase; color: var(--purple);
    }

    /* Characters — slide in from sides after typing */
    .chars {
      position: absolute; bottom: 170px; left: 0; right: 0;
      display: flex; align-items: flex-end; justify-content: center;
    }
    .char-h {
      width: 190px; object-fit: contain; object-position: bottom;
      transform: translateX(-140%);
      opacity: 0;
      transition: transform .8s cubic-bezier(.22,.9,.36,1), opacity .6s ease;
    }
    .char-a {
      width: 190px; object-fit: contain; object-position: bottom;
      margin-left: -32px;
      transform: translateX(140%);
      opacity: 0;
      transition: transform .8s cubic-bezier(.22,.9,.36,1), opacity .6s ease;
    }
    .chars.entered .char-h {
      transform: translateX(0);
      opacity: 1;
    }
    .chars.entered .char-a {
      transform: translateX(0);
      opacity: 1;
    }

    /* Text copy */
    .copy {
      position: absolute; bottom: 44px; left: 0; right: 0;
      text-align: center; padding: 0 28px;
      opacity: 0;
      animation: fadeUp .5s ease forwards .7s;
    }
    .hl {
      font-size: 36px; font-weight: 800;
      line-height: 1.08; letter-spacing: -1px;
      background: linear-gradient(140deg, #fff 50%, rgba(255,255,255,0.5));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      min-height: 4.5em; /* reserve space so layout doesn't jump */
    }

    /* Cursor */
    .cursor {
      display: inline-block;
      width: 2px; height: 1em;
      background: var(--purple);
      vertical-align: middle;
      margin-left: 2px;
      animation: blink .7s step-end infinite;
    }
    .cursor.done { animation: none; opacity: 0; }

    /* Replay button */
    .replay {
      position: absolute; bottom: 12px; right: 14px;
      background: rgba(97,97,255,.15); border: 1px solid rgba(97,97,255,.3);
      border-radius: 20px; padding: 5px 12px;
      font-size: 10px; font-weight: 600; color: #a5a5ff;
      cursor: pointer; letter-spacing: .5px;
      transition: background .2s;
    }
    .replay:hover { background: rgba(97,97,255,.25); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
  </style>
</head>
<body>

  <p class="page-eyebrow">Mobile Hero · Exploration</p>
  <h1 class="page-title">Hero Concept</h1>
  <p class="page-sub">Text types first — then people and agents arrive</p>

  <div class="hero" id="hero">
    <div class="glow-l"></div>
    <div class="glow-r"></div>

    <div class="top-bar">
      <img class="logo-img" src="https://uauxewnxnprttvxnvsit.supabase.co/storage/v1/object/public/monday%20Logo/monday.com%20Logo.png" alt="monday.com">
      <span class="eyebrow-tag">AI Work Platform</span>
    </div>

    <div class="chars" id="chars">
      <img class="char-h" src="https://uauxewnxnprttvxnvsit.supabase.co/storage/v1/object/public/Agents%20and%20People/Human.png" alt="Human">
      <img class="char-a" src="https://uauxewnxnprttvxnvsit.supabase.co/storage/v1/object/public/Agents%20and%20People/Agent.png" alt="Agent">
    </div>

    <div class="copy">
      <div class="hl" id="hl"><span class="cursor" id="cursor"></span></div>
    </div>

    <button class="replay" id="replayBtn">↺ Replay</button>
  </div>

  <script>
    const TEXT = 'People and agents\nworking together\ndriving business\nresults.';
    const CHAR_DELAY = 52;   // ms per character
    const START_DELAY = 900; // ms before typing begins (logo settles first)

    const hlEl     = document.getElementById('hl');
    const cursor   = document.getElementById('cursor');
    const charsEl  = document.getElementById('chars');
    const replayBtn = document.getElementById('replayBtn');

    let timer = null;

    function reset() {
      clearTimeout(timer);
      // Reset text
      hlEl.innerHTML = '';
      hlEl.appendChild(cursor);
      cursor.classList.remove('done');
      // Reset characters
      charsEl.classList.remove('entered');
    }

    function type(fullText, i = 0) {
      if (i === 0) {
        // Place cursor at start
        hlEl.innerHTML = '';
        hlEl.appendChild(cursor);
      }

      if (i < fullText.length) {
        const ch = fullText[i];
        // Insert character before cursor
        const textNode = document.createTextNode(ch === '\n' ? '' : ch);
        if (ch === '\n') {
          const br = document.createElement('br');
          hlEl.insertBefore(br, cursor);
        } else {
          hlEl.insertBefore(textNode, cursor);
        }
        timer = setTimeout(() => type(fullText, i + 1), CHAR_DELAY);
      } else {
        // Typing done — hide cursor, slide in characters
        cursor.classList.add('done');
        timer = setTimeout(() => {
          charsEl.classList.add('entered');
        }, 200);
      }
    }

    function start() {
      reset();
      timer = setTimeout(() => type(TEXT), START_DELAY);
    }

    replayBtn.addEventListener('click', start);

    // Auto-start
    start();
  </script>

</body>
</html>
