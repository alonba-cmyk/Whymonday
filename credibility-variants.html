<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credibility Slide — Variant B</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root { --purple:#6161ff; }
html, body { background:#000; font-family:'Poppins',sans-serif; color:#fff; }

.slide {
  width:100%; min-height:100svh;
  display:flex; flex-direction:column; justify-content:center;
  position:relative; overflow:hidden; padding:64px 28px 48px;
}
.slide-label {
  position:absolute; top:0; left:0; right:0;
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 20px; z-index:10;
  font-size:9px; font-weight:600; letter-spacing:3px; text-transform:uppercase;
  color:rgba(255,255,255,0.3);
}
.var-badge {
  background:var(--purple); color:#fff;
  font-size:8px; font-weight:700; letter-spacing:1px;
  padding:3px 9px; border-radius:20px; text-transform:uppercase;
}

/* ── Headline ── */
.vb-headline {
  font-size:clamp(22px,6vw,32px); font-weight:800; line-height:1.15;
  letter-spacing:-1px; margin-bottom:28px; text-align:center;
  background:linear-gradient(140deg,#fff 50%,rgba(255,255,255,0.45));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}

/* ── Analyst cards ── */
.vb-analyst-row { display:flex; flex-direction:column; gap:12px; width:100%; margin-bottom:12px; }
.vb-analyst {
  display:flex; align-items:center; gap:16px;
  padding:16px 20px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:14px;
}
.vb-analyst-logo {
  height:22px; filter:brightness(0) invert(1); opacity:0.75;
  flex-shrink:0; object-fit:contain; max-width:90px;
}
.vb-analyst-copy { flex:1; }
.vb-analyst-title { font-size:12px; font-weight:600; margin-bottom:2px; }
.vb-analyst-sub { font-size:10px; font-weight:300; color:rgba(255,255,255,0.38); line-height:1.4; }

/* ── Security row ── */
.vb-security {
  display:flex; align-items:center; gap:12px;
  padding:14px 18px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:14px;
}
.vb-shield { flex-shrink:0; }
.vb-certs { display:flex; flex-wrap:wrap; gap:6px; flex:1; }
.vb-cert {
  font-size:9px; font-weight:600; letter-spacing:0.3px;
  border:1px solid rgba(255,255,255,0.16);
  border-radius:20px; padding:3px 10px;
  color:rgba(255,255,255,0.55);
  white-space:nowrap;
}
</style>
</head>
<body>

<div class="slide">
  <div class="slide-label">B — Analysts First <span class="var-badge">Trust</span></div>

  <div class="vb-headline">Recognized by the<br>world's leading analysts.</div>

  <div class="vb-analyst-row">
    <div class="vb-analyst">
      <img class="vb-analyst-logo"
        src="https://uauxewnxnprttvxnvsit.supabase.co/storage/v1/object/public/Enterprise/Gartner.svg"
        alt="Gartner">
      <div class="vb-analyst-copy">
        <div class="vb-analyst-title">3× Magic Quadrant Leader</div>
        <div class="vb-analyst-sub">Only work management platform recognized as Leader in 3 MQ reports</div>
      </div>
    </div>
    <div class="vb-analyst">
      <img class="vb-analyst-logo"
        src="https://uauxewnxnprttvxnvsit.supabase.co/storage/v1/object/public/Enterprise/Forster.svg"
        alt="Forrester">
      <div class="vb-analyst-copy">
        <div class="vb-analyst-title">Total Economic Impact™</div>
        <div class="vb-analyst-sub">Independent research confirms measurable business impact</div>
      </div>
    </div>
  </div>

  <div class="vb-security">
    <div class="vb-shield">
      <svg width="22" height="22" viewBox="0 0 36 36" fill="none">
        <path d="M18 3L5 8.5V17c0 8.4 5.8 16.2 13 18C25.2 33.2 31 25.4 31 17V8.5L18 3z"
          fill="rgba(97,97,255,0.2)" stroke="rgba(97,97,255,0.5)" stroke-width="1.5"/>
        <path d="M12 18l4 4 8-8" stroke="#fff" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="vb-certs">
      <span class="vb-cert">GDPR</span>
      <span class="vb-cert">SOC 2</span>
      <span class="vb-cert">ISO 27001</span>
      <span class="vb-cert">HIPAA</span>
    </div>
  </div>

</div>

</body>
</html>
