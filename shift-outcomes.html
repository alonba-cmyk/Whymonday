<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Shift – Outcomes by Department</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #000;
  --purple: #6161ff;
  --dim: rgba(255,255,255,0.4);
}
body {
  background: var(--bg);
  font-family: 'Poppins', sans-serif;
  color: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 64px 0 80px;
  overflow-x: hidden;
}

/* Header */
.page-header {
  text-align: center;
  margin-bottom: 36px;
  max-width: 680px;
  padding: 0 24px;
}
.eyebrow {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--purple);
  margin-bottom: 14px;
}
.page-title {
  font-size: clamp(24px, 3.8vw, 46px);
  font-weight: 800;
  line-height: 1.15;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, #fff 40%, rgba(255,255,255,0.5));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* AI Logos */
.ai-logos {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 36px;
  margin-bottom: 48px;
  flex-wrap: wrap;
  padding: 0 24px;
}
.ai-logo {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  opacity: 0.28;
  transition: opacity .3s;
}
.ai-logo:hover { opacity: 0.6; }
.ai-logo svg { width: 30px; height: 30px; fill: #fff; }
.ai-logo img { height: 28px; width: auto; filter: brightness(0) invert(1); }
.ai-logo span { font-size: 10px; font-weight: 500; color: #fff; letter-spacing: 1px; }

/* Marquee */
.marquee-wrap {
  width: 100%;
  overflow: hidden;
  -webkit-mask-image: linear-gradient(to right, transparent 0%, #000 8%, #000 92%, transparent 100%);
  mask-image: linear-gradient(to right, transparent 0%, #000 8%, #000 92%, transparent 100%);
}
.marquee-track {
  display: flex;
  gap: 16px;
  width: max-content;
  animation: marquee 36s linear infinite;
  padding: 8px 0 12px;
}
.marquee-wrap:hover .marquee-track { animation-play-state: paused; }

@keyframes marquee {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}

/* Card */
.outcome-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 20px;
  padding: 26px 22px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  width: 280px;
  flex-shrink: 0;
  transition: border-color 0.25s;
  cursor: default;
}
.marquee-wrap:hover .outcome-card:hover { border-color: rgba(255,255,255,0.2); }
.card-top {
  display: flex;
  align-items: center;
  gap: 13px;
}
.card-av {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  border: 2px solid;
  overflow: hidden;
  flex-shrink: 0;
}
.card-av img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top center;
}
.card-dept {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.2px;
}
.card-divider {
  height: 1px;
  background: rgba(255,255,255,0.07);
}
.card-title {
  font-size: 13px;
  font-weight: 700;
  color: #fff;
  line-height: 1.45;
}
.card-desc {
  font-size: 11px;
  color: var(--dim);
  font-weight: 300;
  line-height: 1.75;
}

@media (max-width: 768px) {
  body { padding: 44px 0 60px; }
  .page-title { font-size: 22px; }
  .ai-logos { gap: 20px; margin-bottom: 32px; }
  .ai-logo svg { width: 22px; height: 22px; }
  .ai-logo img { height: 20px; }
  .ai-logo span { font-size: 8px; }
  .outcome-card { width: 72vw; }
  .marquee-track { animation-duration: 28s; }
}
</style>
</head>
<body>

<div class="page-header">

<div class="ai-logos">
  <div class="ai-logo">

    <span>monday</span>
  </div>
  <div class="ai-logo">
    <svg viewBox="0 0 24 24"><path d="M22.282 9.821a5.985 5.985 0 0 0-.516-4.91 6.046 6.046 0 0 0-6.51-2.9A6.065 6.065 0 0 0 4.981 4.18a5.985 5.985 0 0 0-3.998 2.9 6.046 6.046 0 0 0 .743 7.097 5.98 5.98 0 0 0 .51 4.911 6.051 6.051 0 0 0 6.515 2.9A5.985 5.985 0 0 0 13.26 24a6.056 6.056 0 0 0 5.772-4.206 5.99 5.99 0 0 0 3.997-2.9 6.056 6.056 0 0 0-.747-7.073zM13.26 22.43a4.476 4.476 0 0 1-2.876-1.04l.141-.081 4.779-2.758a.795.795 0 0 0 .392-.681v-6.737l2.02 1.168a.071.071 0 0 1 .038.052v5.583a4.504 4.504 0 0 1-4.494 4.494zM3.6 18.304a4.47 4.47 0 0 1-.535-3.014l.142.085 4.783 2.759a.771.771 0 0 0 .78 0l5.843-3.369v2.332a.08.08 0 0 1-.032.065L9.74 19.95a4.5 4.5 0 0 1-6.14-1.646zM2.34 7.896a4.485 4.485 0 0 1 2.366-1.973V11.6a.766.766 0 0 0 .388.677l5.815 3.355-2.02 1.168a.076.076 0 0 1-.071 0L4.01 14.3A4.501 4.501 0 0 1 2.34 7.896zm16.597 3.855l-5.843-3.372 2.02-1.164a.076.076 0 0 1 .072 0l4.807 2.779a4.504 4.504 0 0 1-.695 8.115V12.48a.786.786 0 0 0-.36-.729zm2.01-3.023l-.141-.085-4.774-2.782a.776.776 0 0 0-.785 0L9.409 9.23V6.897a.066.066 0 0 1 .028-.061l4.807-2.774a4.5 4.5 0 0 1 6.68 4.66zm-12.64 4.135l-2.02-1.164a.08.08 0 0 1-.038-.057V6.075a4.5 4.5 0 0 1 7.375-3.453l-.142.08L8.704 5.46a.795.795 0 0 0-.393.681zm1.097-2.365l2.602-1.5 2.607 1.5v2.999l-2.597 1.5-2.607-1.5z"/></svg>

  </div>
  <div class="ai-logo">

    <span>Claude</span>
  </div>
  <div class="ai-logo">
    <svg viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm0 3a4 4 0 1 1 0 8 4 4 0 0 1 0-8zm0 14.5a7.5 7.5 0 0 1-6-3c.022-2 4-3.1 6-3.1s5.978 1.1 6 3.1a7.5 7.5 0 0 1-6 3z"/></svg>
    <span>Copilot</span>
  </div>
</div>

<div class="marquee-wrap">
  <div class="marquee-track" id="marqueeTrack"></div>
</div>

<script>
const BASE = 'https://uauxewnxnprttvxnvsit.supabase.co/storage/v1/object/public/People%20Avatars/';

const cards = [
  { dept:'Marketing', color:'#F48FB1', img:BASE+'MARKETING.png', title:'Campaign brief ready before the meeting ended', desc:'Agent pulled last quarter\'s results, benchmarked competitors, and wrote 5 creative directions — while the team was still in standup.' },
  { dept:'Sales', color:'#F9D27A', img:BASE+'Sales.png', title:'Personalized proposal sent the same day', desc:'Agent built the deck, pulled 3 relevant case studies, and drafted pricing options while the rep wrote the follow-up.' },
  { dept:'HR', color:'#8ECEC0', img:BASE+'HR.png', title:'Full onboarding pack done the night before day one', desc:'Agent set up tool access requests, created a 30-60-90 plan, and briefed the new hire\'s manager — automatically.' },
  { dept:'IT', color:'#A89BD9', img:BASE+'IT.png', title:'Most issues never reach the helpdesk', desc:'Agent diagnosed, routed, and closed routine requests. Humans only handle what actually needs them.' },
  { dept:'Operations', color:'#85C1AE', img:BASE+'OPERATIONS.png', title:'Weekly exec report, fully automated', desc:'Agent pulled data from 4 tools, flagged 2 anomalies, and formatted the update — ready before Monday standup.' },
  { dept:'Product', color:'#7FC8D4', img:BASE+'PRODUCT.png', title:'PRD drafted while the team slept', desc:'Agent turned 6 customer interviews into a structured doc, grouped themes, and flagged conflicting feedback.' },
  { dept:'Finance', color:'#93C6E7', img:BASE+'Finance.png', title:'Budget variance explained automatically', desc:'Agent pulled actuals from 3 systems, reconciled discrepancies, and prepared the CFO\'s monthly summary in minutes.' },
  { dept:'Legal', color:'#F6C27A', img:BASE+'Legal.png', title:'Contract reviewed before the meeting, not after', desc:'Agent flagged non-standard clauses, benchmarked against templates, and prepared a summary before the negotiation started.' },
];

function cardHTML(c) {
  return `<div class="outcome-card">
    <div class="card-top">
      <div class="card-av" style="border-color:${c.color}90">
        <img src="${c.img}" alt="${c.dept}" loading="lazy">
      </div>
      <span class="card-dept" style="color:${c.color}">${c.dept}</span>
    </div>
    <div class="card-divider"></div>
    <div class="card-title">${c.title}</div>
    <div class="card-desc">${c.desc}</div>
  </div>`;
}

// Duplicate for seamless loop
const html = cards.map(cardHTML).join('');
document.getElementById('marqueeTrack').innerHTML = html + html;
</script>
</body>
</html>
