<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Shift – Outcomes by Department</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #000;
  --purple: #6161ff;
  --dim: rgba(255,255,255,0.4);
}
body {
  background: var(--bg);
  font-family: 'Poppins', sans-serif;
  color: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 64px 0 80px;
  overflow-x: hidden;
}

/* Header */
.page-header {
  text-align: center;
  margin-bottom: 48px;
  max-width: 680px;
  padding: 0 24px;
}
.eyebrow {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--purple);
  margin-bottom: 14px;
}
.page-title {
  font-size: clamp(24px, 3.8vw, 48px);
  font-weight: 800;
  line-height: 1.15;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, #fff 40%, rgba(255,255,255,0.5));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* Desktop grid */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  width: 100%;
  max-width: 980px;
  padding: 0 24px;
}

/* Card */
.outcome-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 20px;
  padding: 26px 22px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  transition: border-color 0.25s;
}
.outcome-card:hover { border-color: rgba(255,255,255,0.18); }
.card-top {
  display: flex;
  align-items: center;
  gap: 13px;
}
.card-av {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  border: 2px solid;
  overflow: hidden;
  flex-shrink: 0;
}
.card-av img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top center;
}
.card-dept {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.2px;
}
.card-divider {
  height: 1px;
  background: rgba(255,255,255,0.07);
}
.card-title {
  font-size: 14px;
  font-weight: 700;
  color: #fff;
  line-height: 1.4;
}
.card-desc {
  font-size: 11px;
  color: var(--dim);
  font-weight: 300;
  line-height: 1.75;
}

/* Mobile carousel */
.carousel-wrap {
  display: none;
  flex-direction: column;
  width: 100%;
}
.carousel-scroll {
  display: flex;
  gap: 12px;
  overflow-x: scroll;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding: 4px 24px 8px;
}
.carousel-scroll::-webkit-scrollbar { display: none; }
.carousel-scroll .outcome-card {
  flex-shrink: 0;
  width: 82vw;
  max-width: 320px;
  scroll-snap-align: center;
}
.carousel-dots {
  display: flex;
  gap: 6px;
  justify-content: center;
  margin-top: 20px;
}
.carousel-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  border: none;
  cursor: pointer;
  padding: 0;
  transition: all 0.3s;
}
.carousel-dot.active { background: var(--purple); width: 16px; border-radius: 3px; }

@media (max-width: 768px) {
  body { padding: 44px 0 60px; }
  .cards-grid { display: none; }
  .carousel-wrap { display: flex; }
  .page-title { font-size: 22px; }
}
@media (min-width: 769px) and (max-width: 960px) {
  .cards-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<div class="page-header">
  <p class="eyebrow">The Shift</p>
  <h1 class="page-title">How fast work can get done when people and agents work together.</h1>
</div>

<!-- Desktop grid -->
<div class="cards-grid" id="cardsGrid"></div>

<!-- Mobile carousel -->
<div class="carousel-wrap">
  <div class="carousel-scroll" id="carouselScroll"></div>
  <div class="carousel-dots" id="carouselDots"></div>
</div>

<script>
const BASE = 'https://uauxewnxnprttvxnvsit.supabase.co/storage/v1/object/public/People%20Avatars/';

const cards = [
  {
    dept: 'Marketing',
    color: '#F48FB1',
    img: BASE + 'MARKETING.png',
    title: 'Campaign brief ready before the meeting ended',
    desc: 'Agent pulled last quarter\'s results, benchmarked competitors, and wrote a full brief with 5 creative directions — while the team was still in standup.'
  },
  {
    dept: 'Sales',
    color: '#F9D27A',
    img: BASE + 'Sales.png',
    title: 'Personalized proposal sent the same day',
    desc: 'Agent built the deck, pulled 3 relevant case studies, and drafted pricing options while the rep wrote the follow-up email.'
  },
  {
    dept: 'HR',
    color: '#8ECEC0',
    img: BASE + 'HR.png',
    title: 'Full onboarding pack done the night before day one',
    desc: 'Agent set up tool access requests, created a 30-60-90 plan, and briefed the new hire\'s manager — automatically.'
  },
  {
    dept: 'IT',
    color: '#A89BD9',
    img: BASE + 'IT.png',
    title: 'Most issues never reach the helpdesk',
    desc: 'Agent diagnosed, routed, and closed routine requests. Humans only handle what actually needs them.'
  },
  {
    dept: 'Operations',
    color: '#85C1AE',
    img: BASE + 'OPERATIONS.png',
    title: 'Weekly exec report, fully automated',
    desc: 'Agent pulled data from 4 tools, flagged 2 anomalies, and formatted the update — ready before Monday standup.'
  },
  {
    dept: 'Product',
    color: '#7FC8D4',
    img: BASE + 'PRODUCT.png',
    title: 'PRD drafted while the team slept',
    desc: 'Agent turned 6 customer interviews into a structured requirements doc, grouped themes, and flagged conflicting feedback.'
  },
  {
    dept: 'Finance',
    color: '#93C6E7',
    img: BASE + 'Finance.png',
    title: 'Budget variance explained automatically',
    desc: 'Agent pulled actuals from 3 systems, reconciled discrepancies, and prepared the CFO\'s monthly summary in minutes.'
  },
  {
    dept: 'Legal',
    color: '#F6C27A',
    img: BASE + 'Legal.png',
    title: 'Contract reviewed before the meeting, not after',
    desc: 'Agent flagged non-standard clauses, benchmarked against templates, and prepared a summary — before the negotiation started.'
  },
];

function cardHTML(c) {
  return `<div class="outcome-card">
    <div class="card-top">
      <div class="card-av" style="border-color:${c.color}80">
        <img src="${c.img}" alt="${c.dept}" loading="lazy">
      </div>
      <span class="card-dept" style="color:${c.color}">${c.dept}</span>
    </div>
    <div class="card-divider"></div>
    <div class="card-title">${c.title}</div>
    <div class="card-desc">${c.desc}</div>
  </div>`;
}

// Desktop
document.getElementById('cardsGrid').innerHTML = cards.map(cardHTML).join('');

// Mobile carousel
const scroll = document.getElementById('carouselScroll');
const dots = document.getElementById('carouselDots');
scroll.innerHTML = cards.map(cardHTML).join('');
dots.innerHTML = cards.map((_,i) =>
  `<button class="carousel-dot${i===0?' active':''}" onclick="scrollToCard(${i})"></button>`
).join('');

function scrollToCard(i) {
  const card = scroll.querySelectorAll('.outcome-card')[i];
  if (card) card.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
}

// Update dots on scroll
scroll.addEventListener('scroll', () => {
  const cards = scroll.querySelectorAll('.outcome-card');
  let closest = 0;
  let minDist = Infinity;
  const center = scroll.scrollLeft + scroll.clientWidth / 2;
  cards.forEach((c, i) => {
    const dist = Math.abs(c.offsetLeft + c.offsetWidth / 2 - center);
    if (dist < minDist) { minDist = dist; closest = i; }
  });
  document.querySelectorAll('.carousel-dot').forEach((d,i) => d.classList.toggle('active', i===closest));
}, { passive: true });
</script>
</body>
</html>
