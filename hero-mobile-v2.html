<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobile Hero V2 — Ghost Characters</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --purple: #6161ff; --bg: #09090f; }

    body {
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff; margin: 0; padding: 0;
    }

    .hero {
      width: 100vw; height: 100vh;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }

    /* Ambient glows */
    .glow-l {
      position: absolute; left: -40px; top: 25%;
      width: 300px; height: 300px;
      background: #6161ff; filter: blur(110px); opacity: .11; border-radius: 50%;
      pointer-events: none;
    }
    .glow-r {
      position: absolute; right: -40px; top: 40%;
      width: 300px; height: 300px;
      background: #a855f7; filter: blur(110px); opacity: .09; border-radius: 50%;
      pointer-events: none;
    }

    /* Logo — top center */
    .top-bar {
      position: absolute; top: 28px; left: 0; right: 0;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      z-index: 4;
      opacity: 0;
      animation: fadeUp .5s ease forwards .15s;
    }
    .logo-img { height: 24px; }
    .eyebrow-tag {
      font-size: 9px; font-weight: 700; letter-spacing: 5px;
      text-transform: uppercase; color: var(--purple);
    }

    /* Characters — large ghosted background layer */
    .chars-bg {
      position: absolute; inset: 0;
      z-index: 1; pointer-events: none;
    }
    .char-h {
      position: absolute;
      bottom: 0; left: -63vw;
      height: 70vh; width: auto;
      object-fit: contain; object-position: bottom;
      transform: translateX(-40px); opacity: 0;
      transition: transform 1.6s cubic-bezier(.25,.46,.45,.94), opacity 1.3s ease;
    }
    .char-a {
      position: absolute;
      bottom: 0; right: -50vw;
      height: 70vh; width: auto;
      object-fit: contain; object-position: bottom;
      transform: translateX(40px); opacity: 0;
      transition: transform 1.6s cubic-bezier(.25,.46,.45,.94) .12s, opacity 1.3s ease .12s;
    }
    .chars-bg.entered .char-h { transform: translateX(0); opacity: 0.26; }
    .chars-bg.entered .char-a { transform: translateX(0); opacity: 0.26; }

    /* Radial vignette dims chars in the text zone */
    .vignette {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 54% 38% at 50% 52%,
        rgba(9,9,15,0.93) 0%,
        rgba(9,9,15,0.68) 36%,
        transparent 64%);
      z-index: 2;
      pointer-events: none;
    }

    /* Bottom fade so chars bleed into floor naturally */
    .bottom-fade {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 22%;
      background: linear-gradient(to top, var(--bg) 0%, transparent 100%);
      z-index: 2;
      pointer-events: none;
    }

    /* Text — vertically centered */
    .copy-wrap {
      position: absolute;
      top: 50%; left: 0; right: 0;
      transform: translateY(-52%);
      z-index: 3;
    }
    .copy {
      text-align: center;
      padding: 0 18px;
    }
    .hl {
      font-size: clamp(26px, 6.8vw, 40px);
      font-weight: 800;
      line-height: 1.18;
      letter-spacing: 0;
      background: linear-gradient(140deg, #fff 45%, rgba(255,255,255,0.45));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .hl-line {
      display: block;
      opacity: 0;
      transform: translateY(5px);
      animation: lineIn .6s ease forwards;
    }
    .hl-line:nth-child(1) { animation-delay: .35s; }
    .hl-line:nth-child(2) { animation-delay: .5s; }
    .hl-line:nth-child(3) { animation-delay: .65s; }

    /* Replay — ghost */
    .replay {
      position: absolute; bottom: 10px; right: 12px; z-index: 5;
      background: none; border: none; padding: 4px 8px;
      font-size: 10px; font-weight: 500; color: rgba(255,255,255,0.2);
      cursor: pointer; letter-spacing: .4px;
      transition: color .2s;
    }
    .replay:hover { color: rgba(255,255,255,0.5); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes lineIn {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="hero" id="hero">
    <div class="glow-l"></div>
    <div class="glow-r"></div>

    <div class="top-bar">
      <img class="logo-img" src="https://uauxewnxnprttvxnvsit.supabase.co/storage/v1/object/public/monday%20Logo/monday.com%20Logo.png" alt="monday.com">
      <span class="eyebrow-tag">AI Work Platform</span>
    </div>

    <div class="chars-bg" id="chars">
      <img class="char-h" src="https://uauxewnxnprttvxnvsit.supabase.co/storage/v1/object/public/Agents%20and%20People/Human.png" alt="Human">
      <img class="char-a" src="https://uauxewnxnprttvxnvsit.supabase.co/storage/v1/object/public/Agents%20and%20People/Agent.png" alt="Agent">
    </div>

    <div class="vignette"></div>
    <div class="bottom-fade"></div>

    <div class="copy-wrap">
      <div class="copy">
        <div class="hl" id="hl">
          <span class="hl-line">People and agents</span>
          <span class="hl-line">working together</span>
          <span class="hl-line">driving business results.</span>
        </div>
      </div>
    </div>

    <button class="replay" id="replayBtn">↺ Replay</button>
  </div>

  <script>
    const charsEl   = document.getElementById('chars');
    const replayBtn = document.getElementById('replayBtn');
    const lines     = document.querySelectorAll('.hl-line');
    let timer = null;

    function start() {
      clearTimeout(timer);
      charsEl.classList.remove('entered');

      lines.forEach(el => { el.style.animationName = 'none'; });
      void lines[0].offsetWidth; // force reflow
      lines.forEach(el => { el.style.animationName = ''; });

      timer = setTimeout(() => charsEl.classList.add('entered'), 900);
    }

    replayBtn.addEventListener('click', start);
    setTimeout(() => charsEl.classList.add('entered'), 900);
  </script>

</body>
</html>
