<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>monday.com — Pick Your Pitch (Press)</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width:100%; height:100%; overflow:hidden; background:#000; font-family:'Poppins',sans-serif; }

.grid { display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; width:100vw; height:100vh; gap:3px; background:#000; }

.tile { position:relative; display:flex; align-items:center; justify-content:center; overflow:hidden; background:#0a0a0e; text-decoration:none; -webkit-tap-highlight-color:transparent; transition:transform .3s ease; }
.tile.live { cursor:pointer; }
.tile.live:active { transform:scale(0.98); }

.ring { position:absolute; width:36px; height:36px; border-radius:50%; background:radial-gradient(circle, rgba(97,97,255,0.95), rgba(97,97,255,0) 68%); opacity:0.45; transform:scale(1); transition:transform .8s cubic-bezier(.22,1,.36,1), opacity .8s ease; z-index:0; }
.tile.live:hover .ring { transform:scale(46); opacity:1; }

.name { position:relative; z-index:2; font-weight:800; font-size:clamp(22px,3.6vw,46px); letter-spacing:-0.6px; color:#fff; text-align:center; padding:0 26px; opacity:0; transform:translateY(12px); transition:opacity .4s ease .28s, transform .4s ease .28s; }
.tile.live:hover .name { opacity:1; transform:translateY(0); }

/* Locked tiles — the ring exists but never wakes up */
.tile.locked .ring { background:radial-gradient(circle, rgba(255,255,255,0.5), rgba(255,255,255,0) 68%); opacity:0.08; }
@keyframes breathe { 0%,100%{opacity:.05} 50%{opacity:.14} }
.tile.locked .ring { animation:breathe 3.6s ease-in-out infinite; }
.tile.locked:hover .ring { transform:scale(1.4); opacity:.18; transition:transform .35s ease, opacity .35s ease; }
</style>
</head>
<body>

<div class="grid">

  <a class="tile live" href="mondaystorydeck-agents.html" target="_blank" rel="noopener">
    <div class="ring"></div>
    <span class="name">Close the Gap</span>
  </a>

  <a class="tile live" href="mondaystorydeck-shortpitch.html" target="_blank" rel="noopener">
    <div class="ring"></div>
    <span class="name">More Hands</span>
  </a>

  <div class="tile locked">
    <div class="ring"></div>
  </div>

  <div class="tile locked">
    <div class="ring"></div>
  </div>

</div>

</body>
</html>
