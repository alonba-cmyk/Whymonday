<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S0 Heading Options</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#111; font-family:'Poppins',sans-serif; display:flex; flex-direction:column; align-items:center; padding:32px 16px 64px; gap:32px; }

  .label { color:#888; font-size:11px; letter-spacing:3px; text-transform:uppercase; text-align:center; margin-bottom:8px; }
  .option-tag { display:inline-block; background:#222; color:#aaa; font-size:10px; letter-spacing:2px; text-transform:uppercase; padding:4px 10px; border-radius:20px; margin-bottom:12px; }

  /* Phone shell */
  .phone { width:320px; background:#000; border-radius:32px; overflow:hidden; border:2px solid #333; }
  .phone-inner { padding:48px 24px 40px; display:flex; flex-direction:column; align-items:center; text-align:center; gap:18px; }

  .opening-brand { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .opening-brand img { height:18px; opacity:0.85; }
  .opening-brand span { font-size:10px; font-weight:500; letter-spacing:4px; text-transform:uppercase; color:rgba(255,255,255,0.35); white-space:nowrap; }

  .strip { width:90%; opacity:0.18; }

  /* Option A – no gap */
  .opt-a .line1 { font-size:clamp(28px,8vw,34px); font-weight:800; line-height:1.05; letter-spacing:-0.5px; display:block; background:linear-gradient(135deg,#fff 40%,rgba(255,255,255,0.6)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .opt-a .line2 { font-size:clamp(14px,4vw,18px); font-weight:300; line-height:1.2; color:rgba(255,255,255,0.45); display:block; margin-top:4px; }

  /* Option B – two lines */
  .opt-b .line1 { font-size:clamp(28px,8vw,34px); font-weight:800; line-height:1.1; letter-spacing:-0.5px; display:block; background:linear-gradient(135deg,#fff 40%,rgba(255,255,255,0.6)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .opt-b .line2 { font-size:clamp(14px,4vw,18px); font-weight:300; line-height:1.2; color:rgba(255,255,255,0.45); display:block; margin-top:10px; }

  /* Option C – single headline */
  .opt-c .line1 { font-size:clamp(22px,6.5vw,28px); font-weight:800; line-height:1.15; letter-spacing:-0.5px; display:block; background:linear-gradient(135deg,#fff 40%,rgba(255,255,255,0.6)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }

  .divider { width:100%; height:1px; background:#2a2a2a; }
</style>
</head>
<body>

<!-- OPTION A -->
<div>
  <div class="option-tag">Option A — No gap</div>
  <div class="phone opt-a">
    <div class="phone-inner">
      <div class="opening-brand">
        <img src="https://uauxewnxnprttvxnvsit.supabase.co/storage/v1/object/public/monday%20Logo/monday.com%20Logo.png" alt="monday.com">
        <span>AI Work Platform</span>
      </div>
      <img class="strip" src="https://uauxewnxnprttvxnvsit.supabase.co/storage/v1/object/public/Agents%20and%20People/Agents%20and%20People%20strip.png" alt="">
      <div>
        <span class="line1">People and agents.</span>
        <span class="line2">Working together. Driving results.</span>
      </div>
    </div>
  </div>
</div>

<!-- OPTION B -->
<div>
  <div class="option-tag">Option B — Two lines</div>
  <div class="phone opt-b">
    <div class="phone-inner">
      <div class="opening-brand">
        <img src="https://uauxewnxnprttvxnvsit.supabase.co/storage/v1/object/public/monday%20Logo/monday.com%20Logo.png" alt="monday.com">
        <span>AI Work Platform</span>
      </div>
      <img class="strip" src="https://uauxewnxnprttvxnvsit.supabase.co/storage/v1/object/public/Agents%20and%20People/Agents%20and%20People%20strip.png" alt="">
      <div>
        <span class="line1">People and<br>agents.</span>
        <span class="line2">Working together. Driving results.</span>
      </div>
    </div>
  </div>
</div>

<!-- OPTION C -->
<div>
  <div class="option-tag">Option C — Single headline</div>
  <div class="phone opt-c">
    <div class="phone-inner">
      <div class="opening-brand">
        <img src="https://uauxewnxnprttvxnvsit.supabase.co/storage/v1/object/public/monday%20Logo/monday.com%20Logo.png" alt="monday.com">
        <span>AI Work Platform</span>
      </div>
      <img class="strip" src="https://uauxewnxnprttvxnvsit.supabase.co/storage/v1/object/public/Agents%20and%20People/Agents%20and%20People%20strip.png" alt="">
      <span class="line1">People and agents working together driving business results.</span>
    </div>
  </div>
</div>

</body>
</html>
