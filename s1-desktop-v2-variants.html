<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S1 – Our Mission · Desktop Variant A</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #111; font-family: 'Inter','Helvetica Neue',Arial,sans-serif; color: #fff; padding: 40px 24px 80px; }
  h1.page-title { text-align:center; font-size:13px; font-weight:600; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,0.35); margin-bottom:48px; }
  .variant-label { font-size:11px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,0.3); margin-bottom:12px; padding-left:4px; }
  .slide-frame { width:100%; max-width:1280px; aspect-ratio:16/9; margin:0 auto 64px; border-radius:12px; overflow:hidden; border:1px solid rgba(255,255,255,0.08); position:relative; }

  .slide {
    width:100%; height:100%;
    background:#0a0a0a;
    display:flex;
    position:relative;
    overflow:hidden;
  }
  .slide::before {
    content:''; position:absolute; inset:0;
    background: radial-gradient(ellipse 55% 70% at 65% 50%, rgba(100,78,248,0.09) 0%, transparent 70%);
    pointer-events:none;
  }

  /* ── LEFT PANEL ── */
  .s1-left {
    flex: 0 0 38%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 6% 5% 6% 6%;
    border-right: 1px solid rgba(255,255,255,0.07);
    position: relative;
    z-index: 2;
  }
  .eyebrow {
    font-size: 10px; font-weight: 700; letter-spacing: 3px;
    text-transform: uppercase; color: #644ef8; margin-bottom: 18px;
  }
  .mission {
    font-size: clamp(16px,1.75vw,24px); font-weight: 700;
    line-height: 1.35; color: #fff;
  }
  .s1-tagline {
    font-size: 11px; font-weight: 300;
    color: rgba(255,255,255,0.3); line-height: 1.7;
    margin-top: 20px; max-width: 260px;
  }

  /* ── RIGHT PANEL: HUB NETWORK ── */
  .s1-right {
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* SVG connecting lines — sits behind everything */
  .s1-svg {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  /* Hub (monday) in center */
  .s1-hub {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    z-index: 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .s1-hub-logo {
    width: 36px; height: 36px;
    background: rgba(100,78,248,0.15);
    border: 1px solid rgba(100,78,248,0.4);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .s1-hub-logo svg { width: 18px; height: 18px; }
  .s1-hub-label {
    font-size: 8px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: rgba(100,78,248,0.7);
  }

  /* Dept nodes */
  .s1-node {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    z-index: 3;
    transition: transform 0.2s;
  }
  .s1-node:hover { transform: scale(1.05); }
  .s1-node.active { transform: scale(1.1); }

  .s1-av {
    width: 48px; height: 48px;
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid rgba(255,255,255,0.15);
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .s1-av img { width:100%; height:100%; object-fit:cover; object-position:top; }
  .s1-node.active .s1-av {
    box-shadow: 0 0 0 3px rgba(100,78,248,0.25);
  }

  .s1-node-label {
    font-size: 8px; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    transition: color 0.3s;
    white-space: nowrap;
  }
  .s1-node.active .s1-node-label { color: #fff; }

  /* Info box that appears near active node */
  .s1-info {
    position: absolute;
    z-index: 4;
    background: rgba(10,10,10,0.92);
    border: 1px solid rgba(100,78,248,0.3);
    border-radius: 10px;
    padding: 10px 14px;
    min-width: 150px;
    max-width: 180px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.25s;
  }
  .s1-info.visible { opacity: 1; }
  .s1-info-name {
    font-size: 9px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; margin-bottom: 5px;
  }
  .s1-info-desc {
    font-size: 10px; font-weight: 300;
    color: rgba(255,255,255,0.55); line-height: 1.55;
  }
</style>
</head>
<body>

<h1 class="page-title">S1 · Our Mission · Desktop Variant A</h1>

<div class="variant-label">Variant A — Mission Left + Connected Network Right</div>
<div class="slide-frame">
  <div class="slide">

    <!-- Left: mission text -->
    <div class="s1-left">
      <p class="eyebrow">Our Mission</p>
      <h2 class="mission">monday's mission has always been to help teams get more done and achieve their business goals.</h2>
      <p class="s1-tagline">Every department. People and agents connected through one platform.</p>
    </div>

    <!-- Right: network -->
    <div class="s1-right" id="s1Right">

      <!-- SVG lines rendered by JS -->
      <svg class="s1-svg" id="s1Svg"></svg>

      <!-- Hub -->
      <div class="s1-hub" id="s1Hub">
        <div class="s1-hub-logo">
          <svg viewBox="0 0 24 24" fill="none">
            <circle cx="5" cy="12" r="3" fill="#644ef8"/>
            <circle cx="12" cy="5" r="3" fill="#e8341c"/>
            <circle cx="19" cy="12" r="3" fill="#ffcc00"/>
            <circle cx="12" cy="19" r="3" fill="#00b884"/>
          </svg>
        </div>
        <span class="s1-hub-label">monday</span>
      </div>

      <!-- Info tooltip -->
      <div class="s1-info" id="s1Info">
        <div class="s1-info-name" id="s1InfoName"></div>
        <div class="s1-info-desc" id="s1InfoDesc"></div>
      </div>

      <!-- Dept nodes injected by JS -->
    </div>

  </div>
</div>

<script>
const BASE = 'https://uauxewnxnprttvxnvsit.supabase.co/storage/v1/object/public/People%20Avatars/';
const depts = [
  { name:'Sales',      color:'#F9D27A', desc:'Faster revenue generation',                    img: BASE+'Sales.png' },
  { name:'Finance',    color:'#93C6E7', desc:'Streamline financial operations efficiently',   img: BASE+'Finance.png' },
  { name:'HR',         color:'#8ECEC0', desc:'Accelerate onboarding & employee experience',  img: BASE+'HR.png' },
  { name:'IT',         color:'#A89BD9', desc:'Secure, scalable infrastructure at speed',     img: BASE+'IT.png' },
  { name:'Legal',      color:'#F6C27A', desc:'Reduce risk and move faster on decisions',     img: BASE+'Legal.png' },
  { name:'Marketing',  color:'#F48FB1', desc:'Drive demand and accelerate the sales cycle',  img: BASE+'Marketing.png' },
  { name:'Operations', color:'#85C1AE', desc:'Operational excellence at scale',              img: BASE+'Operations.png' },
  { name:'Product',    color:'#7FC8D4', desc:'Ship faster with the power to build anything', img: BASE+'Product.png' },
];

/*
  Non-circular positions — organic but balanced
  Values are percentage offsets from the right panel's own width/height
  Layout: left column (2), top-left (1), top-right (1), right column (2), bottom (2)
*/
const positions = [
  { x: 12, y: 18 },   // top-left area
  { x: 50, y:  8 },   // top center
  { x: 83, y: 18 },   // top-right area
  { x: 92, y: 50 },   // far right
  { x: 83, y: 80 },   // bottom-right
  { x: 50, y: 90 },   // bottom center
  { x: 12, y: 80 },   // bottom-left
  { x:  5, y: 50 },   // far left
];

const right  = document.getElementById('s1Right');
const svg    = document.getElementById('s1Svg');
const info   = document.getElementById('s1Info');
const infoName = document.getElementById('s1InfoName');
const infoDesc = document.getElementById('s1InfoDesc');
let activeNode = null;

// Build nodes
const nodeEls = depts.map((d, i) => {
  const pos = positions[i];
  const node = document.createElement('div');
  node.className = 's1-node';
  node.style.cssText = `left:${pos.x}%; top:${pos.y}%; transform:translate(-50%,-50%)`;
  node.innerHTML = `
    <div class="s1-av" style="border-color:${d.color}80">
      <img src="${d.img}" alt="${d.name}">
    </div>
    <span class="s1-node-label">${d.name}</span>`;

  node.addEventListener('click', () => activate(i));
  right.appendChild(node);
  return { el: node, pos, d };
});

// Activate first node after render
function activate(idx) {
  nodeEls.forEach((n, i) => {
    n.el.classList.toggle('active', i === idx);
    n.el.querySelector('.s1-av').style.borderColor = i === idx
      ? depts[i].color
      : depts[i].color + '50';
  });

  const { pos, d } = nodeEls[idx];
  infoName.textContent = d.name;
  infoName.style.color = d.color;
  infoDesc.textContent = d.desc;

  // Position info box: flip if node is on right half
  const onRight = pos.x > 50;
  info.style.left = onRight ? `${pos.x - 2}%` : `${pos.x + 8}%`;
  info.style.top  = pos.y > 50 ? `${pos.y - 30}%` : `${pos.y + 14}%`;
  info.style.transform = onRight ? 'translate(-100%, -50%)' : 'translate(0, -50%)';
  info.classList.add('visible');

  drawLines(idx);
}

// Draw SVG lines
function drawLines(activeIdx) {
  const rRect  = right.getBoundingClientRect();
  const hubEl  = document.getElementById('s1Hub');
  const hRect  = hubEl.getBoundingClientRect();
  const hx = hRect.left + hRect.width/2  - rRect.left;
  const hy = hRect.top  + hRect.height/2 - rRect.top;

  svg.innerHTML = '';

  nodeEls.forEach(({ el, d }, i) => {
    const nRect = el.getBoundingClientRect();
    const nx = nRect.left + nRect.width/2  - rRect.left;
    const ny = nRect.top  + nRect.height/2 - rRect.top;

    const isActive = i === activeIdx;
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', hx); line.setAttribute('y1', hy);
    line.setAttribute('x2', nx); line.setAttribute('y2', ny);
    line.setAttribute('stroke', isActive ? d.color : 'rgba(255,255,255,0.08)');
    line.setAttribute('stroke-width', isActive ? '1.5' : '1');
    line.setAttribute('stroke-dasharray', isActive ? 'none' : '4 6');
    svg.appendChild(line);

    // Dot at node end
    if (isActive) {
      const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
      circle.setAttribute('cx', nx); circle.setAttribute('cy', ny);
      circle.setAttribute('r', '3');
      circle.setAttribute('fill', d.color);
      svg.appendChild(circle);
    }
  });
}

// Init after layout settles
setTimeout(() => {
  activate(0);
  // Re-draw on resize
  window.addEventListener('resize', () => {
    const active = nodeEls.findIndex(n => n.el.classList.contains('active'));
    if (active >= 0) drawLines(active);
  });
}, 80);
</script>

</body>
</html>
